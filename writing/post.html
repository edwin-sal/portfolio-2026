<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edwin Sal — Writing</title>
  <link rel="icon" href="../favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fdfcf9;
      color: #1a1a1a;
      font-family: "Iowan Old Style", "Palatino Linotype", "URW Palladio L",
                   P052, Georgia, serif;
      font-size: 23px;
      line-height: 1.7;
      max-width: 80ch;
      margin: 0 auto;
      padding: 3.5rem 2rem 3rem;
    }

    a {
      color: #a33;
      text-decoration: none;
      border-bottom: 1px solid #e3c7c7;
    }
    a:hover { border-bottom-color: #a33; }
    a:visited { color: #7a2020; }

    .back {
      display: inline-block;
      color: #666;
      font-size: .9rem;
      font-style: italic;
      margin: 0 0 2.5rem;
      border-bottom: none;
    }
    .back:hover { color: #a33; border-bottom: none; }
    .back:visited { color: #666; }

    .title {
      font-size: 2.9rem;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 .3rem;
      font-family: "Charter", "Charis SIL", "Iowan Old Style", Georgia, serif;
    }

    .byline {
      color: #666;
      font-style: italic;
      font-size: 1.2rem;
      margin: 0 0 2.5rem;
    }

    .content {
      column-count: 2;
      column-gap: 2.5rem;
      column-rule: 1px solid #e0ddd5;
    }
    .content p { margin: 0 0 1rem; break-inside: avoid; }
    .content ul, .content ol { margin: .6rem 0 1rem 1.4rem; break-inside: avoid; }
    .content li { margin: .2rem 0; }

    .content h2 {
      font-size: 2rem;
      font-weight: 600;
      margin: 2rem 0 .6rem;
      letter-spacing: .01em;
      text-transform: lowercase;
      break-after: avoid;
    }
    .content h3 {
      font-size: 1.55rem;
      font-weight: 600;
      margin: 1.6rem 0 .5rem;
      text-transform: lowercase;
      break-after: avoid;
    }
    .content h4 {
      font-size: 1.3rem;
      font-weight: 600;
      margin: 1.3rem 0 .4rem;
      text-transform: lowercase;
      break-after: avoid;
    }
    .content h5 {
      font-size: 1.15rem;
      font-weight: 600;
      font-style: italic;
      color: #666;
      margin: 1rem 0 .3rem;
      text-transform: lowercase;
      break-after: avoid;
    }

    .content em { font-style: italic; }
    .content blockquote {
      border-left: 2px solid #e0ddd5;
      padding-left: 1rem;
      margin: 1rem 0;
      color: #444;
      font-style: italic;
    }
    .content code {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, "DejaVu Sans Mono", monospace;
      font-size: .88em;
      background: #f2efe8;
      padding: .05em .3em;
      border-radius: 2px;
    }
    .content pre {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, "DejaVu Sans Mono", monospace;
      font-size: .85rem;
      line-height: 1.5;
      background: #f2efe8;
      padding: .8rem 1rem;
      margin: 1rem 0;
      overflow-x: auto;
    }
    .content pre code {
      background: none;
      padding: 0;
      border-radius: 0;
    }

    .loader {
      color: #888;
      font-style: italic;
      font-size: .95rem;
      margin: 1rem 0;
    }

    footer.meta {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #e0ddd5;
      color: #888;
      font-size: .85rem;
      font-style: italic;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
    }
    footer.meta a {
      color: #666;
      border-bottom: none;
    }
    footer.meta a:hover { color: #a33; }
    footer.meta a:visited { color: #666; }

    @media (max-width: 640px) {
      .content { column-count: 1; column-rule: 0; }
    }
  </style>
</head>
<body>
  <a href="../index.html#writing" class="back">← home</a>

  <h1 class="title"></h1>
  <p class="byline"></p>

  <p class="loader" id="loader">loading&hellip;</p>
  <div class="content"></div>

  <footer class="meta">
    <a href="../index.html#writing">← home</a>
    <a href="archive.html">archive →</a>
  </footer>

  <script>
    function formatDate(iso, ts) {
      const [y, m, d] = iso.split('-');
      const weekday = new Date(`${iso}T00:00:00`)
        .toLocaleDateString('en-US', { weekday: 'long' })
        .toLowerCase();
      const base = `${m}/${d}/${y}, ${weekday}`;
      if (!ts || typeof ts !== 'number') return base;
      const time = new Date(ts).toLocaleString('en-US', {
        timeZone: 'Asia/Manila',
        hour: 'numeric', minute: '2-digit', hour12: true,
      }).replace(/\s?(AM|PM)$/, '$1');
      return `${base}, ${time}`;
    }

    (async () => {
      const slug = new URLSearchParams(location.search).get('title');
      const titleEl = document.querySelector('.title');
      const bylineEl = document.querySelector('.byline');
      const contentEl = document.querySelector('.content');
      const loader = document.getElementById('loader');
      const clearLoader = () => loader?.remove();
      if (!slug) { clearLoader(); return; }
      try {
        const res = await fetch(`/api/posts?title=${encodeURIComponent(slug)}`);
        if (!res.ok) { clearLoader(); return; }
        const post = await res.json();
        document.title = `${post.title} — Edwin Sal`;
        titleEl.textContent = post.title;
        bylineEl.textContent = `${formatDate(post.date, post.ts)} - Edwin Sal`;
        contentEl.innerHTML = post.html;
      } catch (e) { /* silent */ }
      finally { clearLoader(); }
    })();
  </script>
</body>
</html>

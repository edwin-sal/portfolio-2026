<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — Edwin Sal</title>
  <meta name="description" content="All writing from Edwin Sal.">
  <link rel="icon" href="../favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fdfcf9;
      color: #1a1a1a;
      font-family: "Iowan Old Style", "Palatino Linotype", "URW Palladio L",
                   P052, Georgia, serif;
      font-size: 23px;
      line-height: 1.7;
      max-width: 62ch;
      margin: 0 auto;
      padding: 3.5rem 2rem 3rem;
    }

    a {
      color: #a33;
      text-decoration: none;
      border-bottom: 1px solid #e3c7c7;
    }
    a:hover { border-bottom-color: #a33; }
    a:visited { color: #7a2020; }

    .back {
      display: inline-block;
      color: #666;
      font-size: .9rem;
      font-style: italic;
      margin: 0 0 2.5rem;
      border-bottom: none;
    }
    .back:hover { color: #a33; border-bottom: none; }
    .back:visited { color: #666; }

    h1 {
      font-size: 2.9rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 1.5rem;
      font-family: "Charter", "Charis SIL", "Iowan Old Style", Georgia, serif;
      text-transform: lowercase;
    }

    .post-list { list-style: none; padding: 0; margin: 0; }
    .post-list li { margin: .6rem 0; display: flex; gap: 1rem; }
    .post-list a { border-bottom: none; }
    .post-list a:hover { color: #7a2020; }
    .post-list time {
      color: #888;
      font-variant-numeric: tabular-nums;
      flex: 0 0 11rem;
      font-size: .9rem;
      padding-top: 2px;
    }
    @media (max-width: 640px) {
      .post-list li { flex-direction: column; gap: .1rem; }
      .post-list time { flex: none; }
    }

    .empty, .loader {
      color: #888;
      font-style: italic;
      font-size: .95rem;
    }

  </style>
</head>
<body>
  <a href="../index.html#writing" class="back">← home</a>

  <h1>Archive</h1>
  <p class="loader" id="archive-loader">loading&hellip;</p>
  <ul class="post-list" id="post-list"></ul>

  <script>
    function formatDate(iso) {
      const [y, m, d] = iso.split('-');
      const weekday = new Date(`${iso}T00:00:00`)
        .toLocaleDateString('en-US', { weekday: 'long' })
        .toLowerCase();
      return `${m}/${d}/${y}, ${weekday}`;
    }

    (async () => {
      const list = document.getElementById('post-list');
      const loader = document.getElementById('archive-loader');
      try {
        const res = await fetch('/api/posts');
        if (!res.ok) return;
        const posts = await res.json();
        if (!Array.isArray(posts) || posts.length === 0) return;
        const frag = document.createDocumentFragment();
        for (const p of posts) {
          const li = document.createElement('li');
          const time = document.createElement('time');
          time.setAttribute('datetime', p.date);
          time.textContent = formatDate(p.date);
          const a = document.createElement('a');
          a.href = `post.html?title=${encodeURIComponent(p.slug)}`;
          a.textContent = p.title;
          a.target = '_blank';
          a.rel = 'noopener';
          li.appendChild(time);
          li.appendChild(a);
          frag.appendChild(li);
        }
        list.appendChild(frag);
      } catch (e) { /* silent */ }
      finally { loader?.remove(); }
    })();
  </script>
</body>
</html>
